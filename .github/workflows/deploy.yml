name: Deploy

on:
  push:
    branches: [main, master]
    tags: ["v*"]

# Only one deploy at a time; cancel any in-progress run on the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  # ── Build + push Docker image ──────────────────────────────────────────────
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # branch push → ghcr.io/…/api:main (or :master)
            type=ref,event=branch
            # semver tag → ghcr.io/…/api:v1.2.3  + :1.2  + :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # always tag with short SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build for both ARM64 (Apple Silicon dev) and AMD64 (cloud VMs)
          platforms: linux/amd64,linux/arm64

  # ── Lint + test gate (must pass before deploy summary) ────────────────────
  # This job re-uses the same checks as pr.yml so the deploy workflow is
  # self-contained and can run on direct pushes to main without a PR.
  python:
    name: Python (ruff + pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" -q

      - name: Lint (ruff)
        run: python -m ruff check src

      - name: Test (pytest)
        run: python -m pytest
        env:
          MOTHERDUCK_TOKEN: test
          LLM_PROVIDER: ollama
          LLM_MODEL: llama3.2
          OLLAMA_BASE_URL: http://localhost:11434/v1
          OLLAMA_API_KEY: test

  dashboard:
    name: Dashboard (tsc + eslint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint (eslint)
        run: pnpm run lint

      - name: Build (tsc + vite)
        run: pnpm run build

  # ── Deployment summary ─────────────────────────────────────────────────────
  summary:
    name: Deployment summary
    needs: [docker, python, dashboard]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Summarise
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker build | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python tests | ${{ needs.python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard    | ${{ needs.dashboard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ref: \`${{ github.ref }}\` · SHA: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
